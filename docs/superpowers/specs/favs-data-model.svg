<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="900" viewBox="0 0 1240 900" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrowHi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="900" fill="#f7f8fa"/>
  <text x="32" y="40" font-size="22" font-weight="700" fill="#1f2937">Televista — data model (favs as a per-user tag · Approach C)</text>

  <!-- Legend -->
  <rect x="32" y="58" width="16" height="16" rx="3" fill="#e8eef6" stroke="#9db4cc"/>
  <text x="54" y="71" font-size="13" fill="#374151">SwiftData @Model (persisted, per-user · local, CloudKit-ready via userID)</text>
  <rect x="430" y="58" width="16" height="16" rx="3" fill="#fff" stroke="#9db4cc" stroke-dasharray="4 3"/>
  <text x="452" y="71" font-size="13" fill="#374151">Runtime value type (in-memory)</text>
  <rect x="700" y="58" width="16" height="16" rx="3" fill="#fdebd8" stroke="#e08a3c"/>
  <text x="722" y="71" font-size="13" fill="#374151">Changed / activated by Approach C</text>

  <!-- ============ Catalog JSON (remote) ============ -->
  <g>
    <rect x="32" y="110" width="300" height="92" rx="8" fill="#fff" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <rect x="32" y="110" width="300" height="26" rx="8" fill="#eef2f7" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <text x="44" y="128" font-size="14" font-weight="700" fill="#1f2937">Catalog  ·  remote JSON (RemoteConfig)</text>
    <text x="44" y="156" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">editorialTags : [Tag]</text>
    <text x="44" y="174" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">channels : [curated Channel]</text>
    <text x="44" y="192" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#6b7280">version, etc.</text>
  </g>

  <!-- ============ UserChannel ============ -->
  <g>
    <rect x="32" y="240" width="300" height="170" rx="8" fill="#e8eef6" stroke="#9db4cc"/>
    <rect x="32" y="240" width="300" height="26" rx="8" fill="#d8e2ee" stroke="#9db4cc"/>
    <text x="44" y="258" font-size="14" font-weight="700" fill="#1f2937">UserChannel</text>
    <text x="44" y="286" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#b91c1c">id  (PK, unique)</text>
    <text x="44" y="304" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">title, youTubeVideoID</text>
    <text x="44" y="322" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">thumbnailURLString?</text>
    <text x="44" y="340" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">isLiveExpected, dateAdded</text>
    <text x="44" y="358" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">tagIDs : [String]</text>
    <text x="44" y="376" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#6b7280">userID?  (sync key)</text>
    <text x="44" y="398" font-size="11.5" fill="#6b7280">User-added channels &amp; their own tags</text>
  </g>

  <!-- ============ ChannelUserState ============ -->
  <g>
    <rect x="32" y="445" width="340" height="270" rx="8" fill="#e8eef6" stroke="#9db4cc"/>
    <rect x="32" y="445" width="340" height="26" rx="8" fill="#d8e2ee" stroke="#9db4cc"/>
    <text x="44" y="463" font-size="14" font-weight="700" fill="#1f2937">ChannelUserState   ·  per-user overlay</text>
    <text x="44" y="491" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#b91c1c">channelID  (PK, unique)</text>

    <!-- highlighted favs fields -->
    <rect x="40" y="500" width="324" height="46" rx="5" fill="#fdebd8" stroke="#e08a3c"/>
    <text x="48" y="518" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#9a3412">userTagIDs : [String]   ← "favs" stored here</text>
    <text x="48" y="536" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#9a3412">isFavorite : Bool   (legacy → migrated, then derived)</text>

    <text x="44" y="566" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">customOrder : Int</text>
    <text x="44" y="584" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">isLiveExpectedOverride? : Bool</text>
    <text x="44" y="602" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">isHidden? : Bool</text>
    <text x="44" y="620" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">customTitle? : String</text>
    <text x="44" y="638" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">playCount? : Int</text>
    <text x="44" y="656" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">lastPlayedDate? : Date</text>
    <text x="44" y="674" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#6b7280">userID?  (sync key)</text>
    <text x="44" y="700" font-size="11.5" fill="#6b7280">Keyed by channelID — works for curated AND user channels</text>
  </g>

  <!-- ============ TagUsageRecord ============ -->
  <g>
    <rect x="32" y="745" width="300" height="86" rx="8" fill="#e8eef6" stroke="#9db4cc"/>
    <rect x="32" y="745" width="300" height="26" rx="8" fill="#d8e2ee" stroke="#9db4cc"/>
    <text x="44" y="763" font-size="14" font-weight="700" fill="#1f2937">TagUsageRecord</text>
    <text x="44" y="791" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#b91c1c">tagID  (PK, unique)</text>
    <text x="44" y="809" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">tapCount : Int</text>
  </g>

  <!-- ============ ChannelMerger ============ -->
  <g>
    <rect x="470" y="430" width="170" height="120" rx="60" fill="#fff7ed" stroke="#e08a3c"/>
    <text x="555" y="478" font-size="14" font-weight="700" fill="#9a3412" text-anchor="middle">ChannelMerger</text>
    <text x="555" y="497" font-size="11.5" fill="#9a3412" text-anchor="middle">.merge(...)</text>
    <text x="555" y="520" font-size="11" fill="#9a3412" text-anchor="middle">applies userTagIDs</text>
    <text x="555" y="535" font-size="11" fill="#9a3412" text-anchor="middle">onto tagIDs (NEW)</text>
  </g>

  <!-- ============ Tag (runtime) ============ -->
  <g>
    <rect x="760" y="110" width="360" height="150" rx="8" fill="#fff" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <rect x="760" y="110" width="360" height="26" rx="8" fill="#eef2f7" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <text x="772" y="128" font-size="14" font-weight="700" fill="#1f2937">Tag   ·  runtime value</text>
    <text x="772" y="156" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#b91c1c">id : String</text>
    <text x="772" y="174" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">name, symbol?, sortOrder</text>
    <text x="772" y="192" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">kind : editorial | user | derived</text>
    <rect x="768" y="204" width="344" height="46" rx="5" fill="#fdebd8" stroke="#e08a3c"/>
    <text x="776" y="222" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#9a3412">favs = Tag(id:"favs", kind:.derived,</text>
    <text x="776" y="240" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#9a3412">           symbol:"star.fill")  · pinned chip</text>
  </g>

  <!-- ============ Channel (runtime) ============ -->
  <g>
    <rect x="760" y="300" width="360" height="200" rx="8" fill="#fff" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <rect x="760" y="300" width="360" height="26" rx="8" fill="#eef2f7" stroke="#9db4cc" stroke-dasharray="4 3"/>
    <text x="772" y="318" font-size="14" font-weight="700" fill="#1f2937">Channel   ·  runtime value (merged lineup)</text>
    <text x="772" y="346" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#b91c1c">id : String</text>
    <text x="772" y="364" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">title, youTubeVideoID, thumbnailURL?</text>
    <text x="772" y="382" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">source : curated | user</text>
    <text x="772" y="400" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">isLiveExpected, dateAdded</text>
    <rect x="768" y="410" width="344" height="28" rx="5" fill="#fdebd8" stroke="#e08a3c"/>
    <text x="776" y="429" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#9a3412">tagIDs : [String]   ← includes "favs" after merge</text>
    <text x="772" y="458" font-size="12.5" font-family="ui-monospace, Menlo, monospace" fill="#374151">playCount, lastPlayedDate  (from overlay)</text>
    <text x="772" y="482" font-size="11.5" fill="#6b7280">TagFilter matches on tagIDs — no favs special-case</text>
  </g>

  <!-- ============ connectors ============ -->
  <!-- catalog curated -> merger -->
  <path d="M332 175 C 420 175, 430 470, 468 478" fill="none" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="350" y="300" font-size="11" fill="#5b6b7b">curated channels</text>
  <!-- userchannel -> merger -->
  <path d="M332 330 C 410 350, 420 470, 468 495" fill="none" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="350" y="430" font-size="11" fill="#5b6b7b">user channels</text>
  <!-- channeluserstate userTagIDs -> merger (highlight) -->
  <path d="M372 523 C 420 520, 430 515, 468 512" fill="none" stroke="#c2410c" stroke-width="2" marker-end="url(#arrowHi)"/>
  <text x="372" y="560" font-size="11" fill="#c2410c">overlay: userTagIDs (+favs), favorites, overrides</text>
  <!-- merger -> channel -->
  <path d="M640 460 C 700 430, 710 410, 758 400" fill="none" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="648" y="430" font-size="11" fill="#5b6b7b">merged Channel</text>
  <!-- channel.tagIDs -> Tag (resolve) -->
  <path d="M940 410 C 940 320, 940 300, 940 262" fill="none" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="948" y="290" font-size="11" fill="#5b6b7b">resolve via tagsByID</text>
  <!-- catalog editorialTags -> Tag -->
  <path d="M332 140 C 560 130, 620 175, 758 175" fill="none" stroke="#5b6b7b" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="470" y="118" font-size="11" fill="#5b6b7b">editorial tags</text>
  <!-- tagusage -> Tag (sort weight) -->
  <path d="M332 770 C 700 760, 1140 470, 1120 260" fill="none" stroke="#9aa7b4" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="700" y="730" font-size="11" fill="#9aa7b4">tapCount → chip sort weight</text>
</svg>

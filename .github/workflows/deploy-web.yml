name: Deploy Web to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if catalog changed
        id: check_catalog
        run: |
          DIFF_REF="${{ github.event.before }}"
          if [ -z "$DIFF_REF" ] || [ "$DIFF_REF" = "0000000000000000000000000000000000000000" ] || ! git rev-parse --verify "$DIFF_REF" >/dev/null 2>&1; then
            DIFF_REF="HEAD~1"
          fi

          if git diff --name-only $DIFF_REF HEAD 2>/dev/null | grep -q 'web/channels-catalog.json'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump manifest version and timestamp
        if: steps.check_catalog.outputs.changed == 'true'
        run: |
          python3 Scripts/bump-catalog-version.py

      - name: Commit and push bumped manifest
        if: steps.check_catalog.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/channels-manifest.json
          git commit -m "chore: auto-bump manifest catalogVersion [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

      - name: Pull Vercel Environment Information
        run: npx -y vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: npx -y vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

name: Release to TestFlight

# Tag a commit `v1.0.1` (matching MARKETING_VERSION) and push it, or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    name: Archive & upload
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Set up Ruby + fastlane (cached)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Generate Xcode project
        run: ./generate.sh   # reads DEVELOPMENT_TEAM from the env below (no .env in CI)
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          # App Store Connect API key
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          # fastlane match (signing assets in a private repo)
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      - name: Upload IPA + dSYMs artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: release-build
          path: |
            *.ipa
            *.app.dSYM.zip
          retention-days: 14
          if-no-files-found: ignore

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; position: relative; width: 100%; }
    #player {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      transform: translate(-50%, -50%);
    }
    body.fit #player {
      position: relative;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      min-height: 0;
      min-width: 0;
      transform: none;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    let isCoverMode = true; // default is cover mode

    function post(type, payload) {
      window.webkit.messageHandlers.player.postMessage(
        Object.assign({ type: type }, payload || {}));
    }
    function onYouTubeIframeAPIReady() { post('apiReady'); }

    function loadVideo(videoId) {
      if (player) { player.loadVideoById(videoId); return; }
      player = new YT.Player('player', {
        width: '100%', height: '100%', videoId: videoId,
        playerVars: {
          autoplay: 1, controls: 0, playsinline: 1, rel: 0,
          modestbranding: 1, fs: 0, iv_load_policy: 3, disablekb: 1,
          enablejsapi: 1, origin: 'https://20four7.fm.rodeo'
        },
        events: {
          onReady: function () {
            updateAspectCover(isCoverMode);
            post('ready');
          },
          onStateChange: function (e) { post('state', { state: e.data }); },
          onError: function (e) { post('error', { code: e.data }); }
        }
      });
    }
    function play()  { player && player.playVideo(); }
    function pause() { player && player.pauseVideo(); }
    function setVolume(v) { player && player.setVolume(v); }
    function setMuted(m) { if (!player) return; m ? player.mute() : player.unMute(); }
    
    function setAspectCover(cover) {
      isCoverMode = cover;
      updateAspectCover(cover);
    }

    function updateAspectCover(cover) {
      if (cover) {
        document.body.classList.remove('fit');
      } else {
        document.body.classList.add('fit');
      }

      let cropX = 0;
      let cropY = 0;

      if (cover) {
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const screenAspect = screenWidth / screenHeight;
        const playerAspect = 16 / 9;

        if (screenAspect > playerAspect) {
          // Landscape: cropped top/bottom
          const playerHeight = screenWidth / playerAspect;
          cropY = (playerHeight - screenHeight) / 2;
        } else {
          // Portrait: cropped left/right
          const playerWidth = screenHeight * playerAspect;
          cropX = (playerWidth - screenWidth) / 2;
        }
      }

      const iframe = document.querySelector('iframe');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({
          type: 'setAspectCover',
          cropX: cropX,
          cropY: cropY
        }, '*');
      }
    }

    // Handle iframe requesting the current aspect cover state
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'requestAspectCover') {
        updateAspectCover(isCoverMode);
      }
    });

    // Handle window resize/rotation
    window.addEventListener('resize', function() {
      updateAspectCover(isCoverMode);
    });
  </script>
</body>
</html>

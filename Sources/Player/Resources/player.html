<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; position: relative; width: 100%; }
    #player {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      transform: translate(-50%, -50%);
    }
    body.fit #player {
      position: relative;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      min-height: 0;
      min-width: 0;
      transform: none;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    function post(type, payload) {
      window.webkit.messageHandlers.player.postMessage(
        Object.assign({ type: type }, payload || {}));
    }
    function onYouTubeIframeAPIReady() { post('apiReady'); }

    function notifyIframe(type) {
      const iframe = document.querySelector('iframe');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: type }, '*');
      }
    }

    function loadVideo(videoId) {
      notifyIframe('user-play');
      if (player) { player.loadVideoById(videoId); return; }
      player = new YT.Player('player', {
        width: '100%', height: '100%', videoId: videoId,
        playerVars: {
          autoplay: 1, controls: 0, playsinline: 1, rel: 0,
          modestbranding: 1, fs: 0, iv_load_policy: 3, disablekb: 1,
          enablejsapi: 1, origin: 'https://20four7.fm.rodeo'
        },
        events: {
          onReady: function () { post('ready'); },
          onStateChange: function (e) { post('state', { state: e.data }); },
          onError: function (e) { post('error', { code: e.data }); }
        }
      });
    }
    function play()  { notifyIframe('user-play'); player && player.playVideo(); }
    function pause() { notifyIframe('user-pause'); player && player.pauseVideo(); }
    function setVolume(v) { player && player.setVolume(v); }
    function setMuted(m) { if (!player) return; m ? player.mute() : player.unMute(); }
    function setAspectCover(cover) {
      if (cover) {
        document.body.classList.remove('fit');
      } else {
        document.body.classList.add('fit');
      }
    }
  </script>
</body>
</html>

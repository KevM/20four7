<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; position: relative; width: 100%; }
    #player {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      transform: translate(-50%, -50%);
    }
    body.fit #player {
      position: relative;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      min-height: 0;
      min-width: 0;
      transform: none;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    let isCoverMode = true; // default is cover mode
    let hasRandomSeeked = false;
    let currentLiveExpected = false;

    function post(type, payload) {
      window.webkit.messageHandlers.player.postMessage(
        Object.assign({ type: type }, payload || {}));
    }
    function onYouTubeIframeAPIReady() { post('apiReady'); }

    function handleVideoStart() {
      if (player && typeof player.getVideoData === 'function') {
        const data = player.getVideoData();
        const isLive = !!(data && data.isLive);
        post('isLive', { isLive: isLive });
        
        if (currentLiveExpected && !isLive && !hasRandomSeeked) {
          const duration = player.getDuration();
          if (duration > 0) {
            hasRandomSeeked = true;
            const randomOffset = Math.floor(Math.random() * (duration * 0.85));
            player.seekTo(randomOffset, true);
          }
        }
      }
    }

    let shouldStartMuted = false;

    function loadVideo(videoId, isLiveExpected, startMuted, forceRecreate) {
      hasRandomSeeked = false;
      currentLiveExpected = !!isLiveExpected;
      shouldStartMuted = !!startMuted;

      if (player && forceRecreate) {
        try { player.destroy(); } catch(e) {}
        player = null;
      }

      let container = document.getElementById('player');
      if (!container) {
        container = document.createElement('div');
        container.id = 'player';
        document.body.appendChild(container);
      }

      if (player) { player.loadVideoById(videoId); return; }
      player = new YT.Player('player', {
        width: '100%', height: '100%', videoId: videoId,
        playerVars: {
          autoplay: 1, controls: 0, playsinline: 1, rel: 0,
          modestbranding: 1, fs: 0, iv_load_policy: 3, disablekb: 1,
          enablejsapi: 1, origin: 'https://20four7.fm.rodeo'
        },
        events: {
          onReady: function () {
            if (shouldStartMuted) {
              try {
                player.mute();
                player.setVolume(0);
              } catch(e) {}
            }
            updateAspectCover(isCoverMode);
            post('ready');
          },
          onStateChange: function (e) {
            post('state', { state: e.data });
            if (e.data === 1) {
              handleVideoStart();
            }
          },
          onError: function (e) { post('error', { code: e.data }); }
        }
      });
    }
    function play()  { player && player.playVideo(); }
    function pause() { player && player.pauseVideo(); }
    function setVolume(v) { player && player.setVolume(v); }
    function setMuted(m) { if (!player) return; m ? player.mute() : player.unMute(); }
    
    function setAspectCover(cover) {
      isCoverMode = cover;
      updateAspectCover(cover);
    }

    function getSafeAreaInsets() {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '0';
      div.style.height = '0';
      div.style.visibility = 'hidden';
      div.style.paddingLeft = 'env(safe-area-inset-left)';
      div.style.paddingRight = 'env(safe-area-inset-right)';
      div.style.paddingTop = 'env(safe-area-inset-top)';
      div.style.paddingBottom = 'env(safe-area-inset-bottom)';
      document.body.appendChild(div);
      
      const style = window.getComputedStyle(div);
      const insets = {
        left: parseFloat(style.paddingLeft) || 0,
        right: parseFloat(style.paddingRight) || 0,
        top: parseFloat(style.paddingTop) || 0,
        bottom: parseFloat(style.paddingBottom) || 0
      };
      
      document.body.removeChild(div);
      return insets;
    }

    function updateAspectCover(cover) {
      if (cover) {
        document.body.classList.remove('fit');
      } else {
        document.body.classList.add('fit');
      }

      let cropX = 0;
      let cropY = 0;

      if (cover) {
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        let playerWidth = screenWidth;
        let playerHeight = screenWidth * 9 / 16;

        if (playerHeight < screenHeight) {
          playerHeight = screenHeight;
          playerWidth = screenHeight * 16 / 9;
        }

        cropX = Math.max(0, (playerWidth - screenWidth) / 2);
        cropY = Math.max(0, (playerHeight - screenHeight) / 2);
      }

      const safeArea = getSafeAreaInsets();

      const iframe = document.querySelector('iframe');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({
          type: 'setAspectCover',
          cropX: cropX,
          cropY: cropY,
          safeArea: safeArea
        }, '*');
      }
    }

    // Handle iframe requesting the current aspect cover state
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'requestAspectCover') {
        updateAspectCover(isCoverMode);
      }
    });

    // Handle window resize/rotation
    window.addEventListener('resize', function() {
      updateAspectCover(isCoverMode);
      // Wait for layout/insets updates to settle during orientation change animations
      setTimeout(function() { updateAspectCover(isCoverMode); }, 100);
      setTimeout(function() { updateAspectCover(isCoverMode); }, 300);
    });
  </script>
</body>
</html>

name: 20Four7
options:
  bundleIdPrefix: fm.rodeo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
targets:
  TwentyFourSeven:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fm.rodeo.20four7
        INFOPLIST_KEY_CFBundleDisplayName: "20Four7"
        INFOPLIST_KEY_CFBundleName: "20Four7"
        ASSETCATALOG_COMPILER_APPICON_NAME: TwentyFourSeven
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
  TwentyFourSevenTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: TwentyFourSeven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fm.rodeo.20four7.tests
schemes:
  20Four7:
    build:
      targets:
        TwentyFourSeven: all
    test:
      targets:
        - TwentyFourSevenTests
